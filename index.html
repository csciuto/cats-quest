<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat's Quest</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="game" tabindex="0"></canvas>
  <div id="hints">
    <b>MOVE:</b> <span>ARROW KEYS</span> &middot;
    <b>INVENTORY:</b> <span>TAB</span> &middot;
    <b>HELP:</b> <span>TYPE "HELP"</span> &middot;
    <b>ABOUT:</b> <span>TYPE "ABOUT"</span> &middot;
    <a href="test.html" style="color:#444;text-decoration:none;font-size:9px;font-family:monospace;letter-spacing:1px"><b style="color:#666">TESTS</b></a>
  </div>
  <div id="_tov" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;align-items:flex-start;justify-content:center;overflow:auto;padding:20px">
    <div id="_tov_inner" style="max-width:700px;width:100%">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="color:#55FFFF;font-family:monospace;font-size:15px;font-weight:bold">CAT'S QUEST v1.1 — TEST SUITE | github.com/csciuto/cats-quest/issues</span>
        <button onclick="document.getElementById('_tov').style.display='none';document.getElementById('game').focus()" style="background:#333;color:#ccc;border:1px solid #555;padding:4px 12px;cursor:pointer;font-family:monospace;font-size:12px">✕ CLOSE</button>
      </div>
      <div id="_tov_body"></div>
    </div>
  </div>

  <!-- dependency order matters -->
  <script src="js/constants.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/font.js"></script>
  <script src="js/collisions.js"></script>
  <script src="js/animation.js"></script>
  <script src="js/state.js"></script>
  <script src="js/rooms.js"></script>
  <script src="js/player.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/input.js"></script>
  <script src="js/tests.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
